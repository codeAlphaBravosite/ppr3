/* ── CSS DESIGN TOKENS ──────────────────────────────────── */
:root {
  --font-serif:'Lora',Georgia,serif; --font-sans:'DM Sans',system-ui,sans-serif; --font-mono:'JetBrains Mono',Consolas,monospace;
  --bg:#faf8f3; --surface:#ffffff; --surface2:#f5f0e5; --border:#e8e0d0;
  --text:#1e1710; --text2:#6b5f52; --text3:#9a8a7a;
  --accent:#c17a35; --accent-light:#f5e9d9; --accent-text:#7d4e10;
  --btn-primary-bg:#1e1710; --btn-primary-text:#faf8f3;
  --btn-ghost-hover:#e8e0d0;
  --input-bg:#f0ebe0;
  --danger:#ef4444; --danger-light:rgba(239,68,68,0.12);
  --success:#22c55e; --success-light:rgba(34,197,94,0.12);
  --overlay:rgba(0,0,0,0.45);
  --nav-h:64px; --safe-bottom:env(safe-area-inset-bottom,0px); --safe-top:env(safe-area-inset-top,0px);
}
.theme-sepia {
  --bg:#f5efe0; --surface:#fdf6e4; --surface2:#ede5cc; --border:#ddd0b3;
  --text:#4a3728; --text2:#7a6048; --text3:#a08060;
  --accent:#a0622a; --accent-light:#ede0c8; --accent-text:#6b3d12;
  --btn-primary-bg:#4a3728; --btn-primary-text:#fdf6e4;
  --btn-ghost-hover:#ddd0b3;
  --input-bg:#ece5d0;
}
.theme-dark {
  --bg:#141210; --surface:#1e1b17; --surface2:#252118; --border:#2e2a24;
  --text:#e8ddd0; --text2:#9a8878; --text3:#6a5a4e;
  --accent:#d4894a; --accent-light:#2e2318; --accent-text:#d4894a;
  --btn-primary-bg:#e8ddd0; --btn-primary-text:#141210;
  --btn-ghost-hover:#2e2a24;
  --input-bg:#252118;
  --danger:#f87171; --danger-light:rgba(248,113,113,0.15);
  --success:#4ade80; --success-light:rgba(74,222,128,0.15);
}

/* ── BASE ───────────────────────────────────────────────── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);margin:0;}
#root{height:100%;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ── ANIMATIONS ─────────────────────────────────────────── */
.slide-enter{animation:slideIn 0.28s cubic-bezier(0.4,0,0.2,1) both;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.fade-in{animation:fadeIn 0.2s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── PROSE ──────────────────────────────────────────────── */
.prose{font-family:var(--font-serif);color:var(--text);line-height:1.8;}
.prose h1{font-size:1.7em;font-weight:700;margin:1.4em 0 0.5em;border-bottom:1px solid var(--border);padding-bottom:0.3em;}
.prose h2{font-size:1.4em;font-weight:600;margin:1.3em 0 0.4em;}
.prose h3{font-size:1.15em;font-weight:600;margin:1.1em 0 0.3em;}
.prose h4{font-size:1em;font-weight:700;margin:1em 0 0.3em;}
.prose p{margin:0.8em 0;font-weight:520;}
.prose strong{font-weight:700;}
.prose em{font-style:italic;}
.prose del{text-decoration:line-through;opacity:0.7;}
.prose a{color:var(--accent);text-decoration:underline;text-underline-offset:3px;}
.prose code{background:var(--surface2);padding:0.15em 0.45em;border-radius:5px;font-family:var(--font-mono);font-size:0.83em;color:var(--text);}
.prose pre{background:#1a1a2e;padding:1.1em 1.3em;border-radius:10px;overflow-x:auto;margin:1.1em 0;position:relative;-webkit-overflow-scrolling:touch;}
.prose pre code{background:none;padding:0;color:#e2e8f0;font-size:0.88em;line-height:1.6;}
.prose blockquote{border-left:3px solid var(--accent);padding:0.6em 1em 0.6em 1.2em;margin:1.2em 0;font-style:italic;opacity:0.9;background:var(--accent-light);border-radius:0 8px 8px 0;font-weight:480;}
.prose ul{list-style:none;padding-left:1.2em;margin:0.8em 0;}
.prose ul li::before{content:'•';color:var(--accent);font-weight:700;margin-right:0.5em;margin-left:-1.1em;}
.prose ol{list-style:decimal;padding-left:1.5em;margin:0.8em 0;}
.prose li{margin:0.35em 0;line-height:1.75;font-weight:480;}
.prose li ul,.prose li ol{margin:0.2em 0;}
.prose .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:1.2em 0;border-radius:8px;border:1px solid var(--border);}
.prose table{width:100%;border-collapse:collapse;font-size:0.9em;margin:0;}
.prose th{border-bottom:2px solid var(--border);padding:0.55em 0.8em;text-align:left;font-weight:600;background:var(--accent-light);white-space:nowrap;color:var(--text);}
.prose td{border-bottom:1px solid var(--border);padding:0.5em 0.8em;color:var(--text);font-weight:480;}
.prose tr:last-child td{border-bottom:none;}
.prose tr:nth-child(even) td{background:rgba(128,128,128,0.06);}
.prose hr{border:none;border-top:1px solid var(--border);margin:2em 0;}
.prose img{max-width:100%;border-radius:10px;margin:1.2em auto;display:block;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
.prose input[type="checkbox"]{margin-right:0.5em;accent-color:var(--accent);width:1em;height:1em;}
.prose li:has(input[type="checkbox"]){list-style:none;margin-left:-1.2em;}
.prose li:has(input[type="checkbox"])::before{content:none;}
.katex{font-size:1.1em !important;}
.katex-display{overflow-x:auto;margin:1em 0;}

/* ── EDITOR ─────────────────────────────────────────────── */
.editor-area{font-family:var(--font-mono);resize:none;outline:none;line-height:1.7;color:var(--text);}
.editor-toolbar-btn{padding:5px 9px;border-radius:6px;font-size:13px;cursor:pointer;transition:background 0.15s;color:var(--text);background:transparent;border:none;}
.editor-toolbar-btn:hover{background:var(--btn-ghost-hover);}
.editor-toolbar-btn:active{background:var(--border);}
.toolbar-wrap{position:relative;}
.toolbar-wrap::after{content:'';position:absolute;right:0;top:0;bottom:0;width:28px;background:linear-gradient(to right,transparent,var(--surface));pointer-events:none;}

/* ── CODE COPY BUTTON ───────────────────────────────────── */
.code-copy-btn{position:absolute;top:8px;right:8px;padding:3px 10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:5px;color:#aaa;font-size:11px;cursor:pointer;font-family:var(--font-sans);}
.code-copy-btn:hover{background:rgba(255,255,255,0.2);color:#fff;}

/* ── UTILITIES ──────────────────────────────────────────── */
.hide-scrollbar{scrollbar-width:none;-ms-overflow-style:none;}
.hide-scrollbar::-webkit-scrollbar{display:none;}
.safe-top{padding-top:max(16px,env(safe-area-inset-top,0px));}
.surface{background:var(--surface);border:1px solid var(--border);}

/* ── SEARCH HIGHLIGHT ───────────────────────────────────── */
mark{background:rgba(251,191,36,0.35);color:var(--text);border-radius:2px;padding:0 2px;}

/* ── BOTTOM NAV ─────────────────────────────────────────── */
.bottom-nav{height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--surface);border-top:1px solid var(--border);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0;cursor:pointer;transition:color 0.15s;border:none;background:none;color:var(--text2);font-size:10px;font-family:var(--font-sans);font-weight:500;}
.nav-btn.active{color:var(--accent);}
.nav-btn-new{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;}

/* ── READER FAB ─────────────────────────────────────────── */
.reader-fab{position:fixed;bottom:0;left:0;right:0;z-index:40;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.reader-fab.fab-hidden{transform:translateY(100%);}
.reader-fab-inner{display:flex;align-items:center;justify-content:space-around;padding:10px 8px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);}
.fab-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:12px;border:none;background:none;color:var(--text2);font-size:10px;font-family:var(--font-sans);font-weight:500;cursor:pointer;transition:color 0.15s,background 0.15s;min-width:52px;}
.fab-btn:active{background:var(--btn-ghost-hover);}
.fab-btn.fab-accent{color:var(--accent);}
.fab-center-btn{background:var(--accent);border:none;color:white;border-radius:16px;padding:10px 24px;font-size:13px;font-weight:600;font-family:var(--font-sans);cursor:pointer;box-shadow:0 4px 14px rgba(193,122,53,0.35);display:flex;align-items:center;gap:8px;transition:opacity 0.15s,transform 0.15s;}
.fab-center-btn:active{opacity:0.85;transform:scale(0.97);}

/* ── READER HEADER ──────────────────────────────────────── */
.reader-header{transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),opacity 0.25s;position:sticky;top:0;z-index:30;}
.reader-header.immersive{transform:translateY(-100%);opacity:0;pointer-events:none;margin-bottom:-64px;}

/* ── BOTTOM SHEET ───────────────────────────────────────── */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:60;}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:61;border-radius:20px 20px 0 0;background:var(--surface);border-top:1px solid var(--border);padding-bottom:max(24px,env(safe-area-inset-bottom));animation:sheetUp 0.28s cubic-bezier(0.4,0,0.2,1) both;max-height:78vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:4px;background:var(--border);margin:12px auto 16px;flex-shrink:0;}

/* ── TOC ────────────────────────────────────────────────── */
.toc-item{display:flex;align-items:center;gap:10px;padding:11px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;-webkit-tap-highlight-color:transparent;}
.toc-item:last-child{border-bottom:none;}
.toc-item:active{background:var(--surface2);}
.toc-h1{font-weight:700;font-size:15px;color:var(--text);}
.toc-h2{padding-left:30px;font-size:14px;font-weight:600;color:var(--text);}
.toc-h3{padding-left:46px;font-size:13px;font-weight:500;color:var(--text2);}
.toc-h4,.toc-h5,.toc-h6{padding-left:60px;font-size:12px;color:var(--text2);}

/* ── MODAL ──────────────────────────────────────────────── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);z-index:80;display:flex;align-items:flex-end;}
.modal-sheet{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:max(28px,env(safe-area-inset-bottom));animation:sheetUp 0.25s cubic-bezier(0.4,0,0.2,1) both;}

/* ── APPEARANCE PICKER ──────────────────────────────────── */
.appear-chip{flex:1;padding:10px 6px;border-radius:12px;border:2px solid transparent;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s;font-family:var(--font-sans);}
.appear-chip.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(193,122,53,0.25);}
.range-row{display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:12px;padding:8px 16px;margin-bottom:20px;}
.range-btn{font-size:18px;font-weight:700;color:var(--text);background:none;border:none;cursor:pointer;padding:4px 8px;line-height:1;}
.range-val{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--text);font-family:var(--font-mono);}

/* ── INPUT BASE ─────────────────────────────────────────── */
.inp{width:100%;background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:12px;outline:none;font-family:var(--font-sans);}
.inp::placeholder{color:var(--text3);}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(193,122,53,0.2);}

/* ── SECTION LABEL ──────────────────────────────────────── */
.sec-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);margin-bottom:8px;font-family:var(--font-sans);}
</style>

<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" crossorigin="anonymous"></script>
<script type="module">
// ── INDEXEDDB ────────────────────────────────────────────────
const DB={_db:null,
  async open(){if(this._db)return this._db;return new Promise((res,rej)=>{const r=indexedDB.open('lexicon_db',1);r.onupgradeneeded=e=>{try{e.target.result.createObjectStore('kv');}catch(_){}};r.onsuccess=e=>{this._db=e.target.result;res(this._db);};r.onerror=()=>rej(r.error);});},
  async get(key){try{const db=await this.open();return new Promise(res=>{const r=db.transaction('kv').objectStore('kv').get(key);r.onsuccess=()=>res(r.result??null);r.onerror=()=>res(null);});}catch{return null;}},
  async set(key,val){try{const db=await this.open();return new Promise(res=>{const r=db.transaction('kv','readwrite').objectStore('kv').put(val,key);r.onsuccess=()=>res(true);r.onerror=()=>res(false);});}catch{return false;}}
};

// ── SCROLL POSITION STORE (module-level, survives view unmounts) ──
// Key: view-specific string → value: scrollTop
const _scrollPos = new Map();

// ── IMPORTS ──────────────────────────────────────────────────
import{useState,useEffect,useReducer,useMemo,useCallback,useRef,memo,createContext,useContext}from'react';
import{createRoot}from'react-dom/client';
import*as React from'react';

// ── CDN LOADER ───────────────────────────────────────────────
const _loaded={};
function loadScript(src,g){if(_loaded[src])return Promise.resolve(window[g]);return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.crossOrigin='anonymous';s.onload=()=>{_loaded[src]=true;res(window[g]);};s.onerror=rej;document.head.appendChild(s);});}
let MARKED_READY=false,KATEX_READY=false,PURIFY_READY=false;
async function initLibs(){await Promise.all([loadScript('https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js','marked'),loadScript('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js','katex'),loadScript('https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js','DOMPurify')]);setupMarked();MARKED_READY=true;KATEX_READY=true;PURIFY_READY=true;}

// ── MARKED SETUP (v12 token API) ────────────────────────────
let _seenIds={};
function setupMarked(){
  const R=new window.marked.Renderer();
  R.code=function(t,la){
    const text=t&&typeof t==='object'?(t.text??''):String(t??'');
    const lang=t&&typeof t==='object'?(t.lang??''):(la??'');
    const language=lang?lang.split(/\s/)[0]:'';
    let hl=escHtml(text);
    try{if(language&&window.hljs?.getLanguage(language))hl=window.hljs.highlight(text,{language}).value;else if(window.hljs)hl=window.hljs.highlightAuto(text).value;}catch(_){}
    const ll=language?`<span style="position:absolute;top:8px;right:65px;font-size:10px;color:#888;font-family:var(--font-mono);text-transform:uppercase;pointer-events:none;">${escHtml(language)}</span>`:'';
    return `<div style="position:relative;margin:1.1em 0;"><pre style="background:#1a1a2e;padding:1.1em 1.3em;border-radius:10px;overflow-x:auto;margin:0;"><code class="hljs ${escHtml(language)}" style="background:none;padding:0;font-size:0.88em;line-height:1.6;">${hl}</code></pre>${ll}<button class="code-copy-btn" onclick="(function(b){var c=b.closest('div').querySelector('code');navigator.clipboard&&navigator.clipboard.writeText(c.textContent).then(function(){b.textContent='Copied!';setTimeout(function(){b.textContent='Copy'},1500)}).catch(function(){});})(this)">Copy</button></div>`;
  };
  R.heading=function(t,la){
    const raw=t&&typeof t==='object'?(t.text??''):String(t??'');
    const lv=t&&typeof t==='object'?(t.depth??1):(la??1);
    const clean=raw.replace(/<[^>]+>/g,'');
    let base=clean.toLowerCase().replace(/[^\w\s-]+/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-+|-+$/g,'')||'h';
    if(/^\d/.test(base))base='h-'+base;
    _seenIds[base]=(_seenIds[base]||0)+1;
    const id=_seenIds[base]>1?`${base}-${_seenIds[base]}`:base;
    return `<h${lv} id="${id}">${raw}</h${lv}>`;
  };
  R.table=function(t,b){
    if(typeof t==='string')return`<div class="table-wrap"><table><thead>${t}</thead><tbody>${b}</tbody></table></div>`;
    const{header=[],rows=[],align=[]}=t||{};
    const th='<tr>'+header.map((c,i)=>`<th${align[i]?` style="text-align:${align[i]}"`:''}>` +(c.text??'')+'</th>').join('')+'</tr>';
    const tb=rows.map(r=>'<tr>'+r.map((c,i)=>`<td${align[i]?` style="text-align:${align[i]}"`:''}>` +(c.text??'')+'</td>').join('')+'</tr>').join('');
    return`<div class="table-wrap"><table><thead>${th}</thead><tbody>${tb}</tbody></table></div>`;
  };
  R.checkbox=function(t){const c=t&&typeof t==='object'?!!t.checked:!!t;return`<input type="checkbox" ${c?'checked':''} disabled style="cursor:default;margin-right:0.4em;"> `;};
  window.marked.use({renderer:R,gfm:true,breaks:true});
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderMarkdown(text){
  if(!MARKED_READY||!text)return text||'';
  _seenIds={};
  const store=[];
  let p=text
    .replace(/\$\$[\s\S]+?\$\$/g,m=>{store.push({d:true,s:m.slice(2,-2)});return`%%M${store.length-1}%%`;})
    .replace(/\$[^\n$]+?\$/g,m=>{store.push({d:false,s:m.slice(1,-1)});return`%%I${store.length-1}%%`;})
    .replace(/\\\[[\s\S]+?\\\]/g,m=>{store.push({d:true,s:m.slice(2,-2)});return`%%M${store.length-1}%%`;})
    .replace(/\\\([\s\S]+?\\\)/g,m=>{store.push({d:false,s:m.slice(2,-2)});return`%%I${store.length-1}%%`;});
  let html=window.marked.parse(p);
  if(KATEX_READY){
    html=html
      .replace(/%%M(\d+)%%/g,(_,i)=>{try{return window.katex.renderToString(store[+i].s,{displayMode:true,throwOnError:false});}catch{return store[+i].s;}})
      .replace(/%%I(\d+)%%/g,(_,i)=>{try{return window.katex.renderToString(store[+i].s,{displayMode:false,throwOnError:false});}catch{return store[+i].s;}});
  }
  if(PURIFY_READY){
    html=window.DOMPurify.sanitize(html,{ADD_TAGS:['math','annotation','semantics','mrow','mi','mn','mo','mfrac','msup','msub','msqrt','mspace','mtext','mover','munder'],ADD_ATTR:['encoding','class','style','id','aria-hidden','focusable'],FORCE_BODY:false});
    html=html.replace(/(<button class="code-copy-btn")[^>]*>/g,`$1 onclick="(function(b){var c=b.closest('div').querySelector('code');navigator.clipboard&&navigator.clipboard.writeText(c.textContent).then(function(){b.textContent='Copied!';setTimeout(function(){b.textContent='Copy'},1500)}).catch(function(){});})(this)">`);
  }
  return html;
}

// ── CONSTANTS ────────────────────────────────────────────────
const IDB_KEY='lexicon_state_v3';
const IDB_SCROLL='lexicon_scroll_v1';
const SORT_OPTIONS=[{id:'modified',label:'Last Modified'},{id:'created',label:'Date Created'},{id:'name',label:'Name A–Z'},{id:'words',label:'Reading Time'}];

// Collection palette — vivid, clearly distinct in all three themes
const COL_PALETTES=[
  {l:{bg:'#fef3c7',bd:'#f59e0b',tx:'#78350f'},d:{bg:'#2d1f00',bd:'#b45309',tx:'#fcd34d'}},  // amber
  {l:{bg:'#dbeafe',bd:'#3b82f6',tx:'#1e3a8a'},d:{bg:'#0c1a3a',bd:'#1d4ed8',tx:'#93c5fd'}},  // blue
  {l:{bg:'#fce7f3',bd:'#ec4899',tx:'#831843'},d:{bg:'#2d0a1e',bd:'#be185d',tx:'#f9a8d4'}},  // pink
  {l:{bg:'#d1fae5',bd:'#10b981',tx:'#064e3b'},d:{bg:'#022c1e',bd:'#047857',tx:'#6ee7b7'}},  // emerald
  {l:{bg:'#ede9fe',bd:'#8b5cf6',tx:'#4c1d95'},d:{bg:'#1a0a3d',bd:'#6d28d9',tx:'#c4b5fd'}},  // violet

function colColors(colorIdx,idx,theme){
  // Use colorIdx if valid, fall back to position index so each card always has a unique color
  const i=(typeof colorIdx==='number'?colorIdx:idx)%COL_PALETTES.length;
  const p=COL_PALETTES[i];return theme==='dark'?p.d:p.l;
}

function getWordCount(t){
  if(!t)return 0;
  const s=t.replace(/```[\s\S]*?```/g,' ').replace(/`[^`\n]+`/g,' ').replace(/\[([^\]]*)\]\([^)]*\)/g,'$1').replace(/[#*_~>|^`\[\]()]/g,' ').replace(/\s+/g,' ').trim();
  return s?s.split(/\s+/).filter(Boolean).length:0;
}
function getReadTime(t){const w=getWordCount(t);const m=Math.ceil(w/238);return{words:w,mins:Math.max(w>0?1:0,m)};}
function fmtDate(ts){if(!ts)return'';const d=new Date(ts),now=new Date(),diff=now-d;if(diff<60000)return'just now';if(diff<3600000)return`${Math.floor(diff/60000)}m ago`;if(diff<86400000)return`${Math.floor(diff/3600000)}h ago`;if(diff<604800000)return`${Math.floor(diff/86400000)}d ago`;if(d.getFullYear()===now.getFullYear())return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}

const defaultState={

function reducer(state,action){
  switch(action.type){
    case'NAVIGATE':return{...state,navStack:[...state.navStack,action.payload]};
    case'BACK':return state.navStack.length<=1?state:{...state,navStack:state.navStack.slice(0,-1)};
    case'RESET_NAV':return{...state,navStack:[{view:'dashboard',params:{}}]};
    case'CREATE_COLLECTION':{const nc={id:genId(),name:action.name,colorIdx:state.collections.length%COL_PALETTES.length};return{...state,collections:[...state.collections,nc]};}
    case'UPDATE_COLLECTION':return{...state,collections:state.collections.map(c=>c.id===action.id?{...c,...action.patch}:c)};
    case'DELETE_COLLECTION':return{...state,collections:state.collections.filter(c=>c.id!==action.id),folders:state.folders.filter(f=>f.collectionId!==action.id),notes:state.notes.filter(n=>n.collectionId!==action.id)};
    case'CREATE_FOLDER':{const nf={id:genId(),name:action.name,collectionId:action.collectionId,createdAt:Date.now()};return{...state,folders:[...state.folders,nf]};}
    case'UPDATE_FOLDER':return{...state,folders:state.folders.map(f=>f.id===action.id?{...f,...action.patch}:f)};
    case'DELETE_FOLDER':return{...state,folders:state.folders.filter(f=>f.id!==action.id),notes:state.notes.map(n=>n.folderId===action.id?{...n,folderId:undefined}:n)};
    case'CREATE_NOTE':{const nn={id:genId(),title:action.title,content:action.content,collectionId:action.collectionId,folderId:action.folderId||undefined,createdAt:Date.now(),modifiedAt:Date.now()};return{...state,notes:[nn,...state.notes]};}
    case'UPDATE_NOTE':return{...state,notes:state.notes.map(n=>n.id===action.id?{...n,title:action.title??n.title,content:action.content??n.content,modifiedAt:Date.now()}:n)};
    case'DELETE_NOTE':return{...state,notes:state.notes.filter(n=>n.id!==action.id)};
    case'RESTORE_NOTE':if(state.notes.find(n=>n.id===action.note.id))return state;return{...state,notes:[action.note,...state.notes]};
    case'OPEN_NOTE':return{...state,notes:state.notes.map(n=>n.id===action.id?{...n,lastOpenedAt:Date.now()}:n)};
    case'SET':return{...state,...action.payload};
    case'HYDRATE':return{...defaultState,...action.data,navStack:[{view:'dashboard',params:{}}]};
    case'IMPORT':{
      const{collections=[],folders=[],notes=[]}=action.data;
      const mi=(ex,inc)=>{const m={};ex.forEach(i=>m[i.id]=i);inc.forEach(i=>m[i.id]=i);return Object.values(m);};
      const mc=mi(state.collections,collections);
      const mf=mi(state.folders,folders);
      const vids=new Set(mc.map(c=>c.id));
      const mn=mi(state.notes,notes).filter(n=>vids.has(n.collectionId));
      return{...state,collections:mc,folders:mf,notes:mn};
    }
    default:return state;
  }
}

async function copyNote(note){
  const text=note.title+(note.content?'\n\n'+note.content:'');
  try{await navigator.clipboard.writeText(text);return true;}
  catch{try{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);return true;}catch{return false;}}
}

  function handleScroll(e){

    if(Math.abs(delta)>10)setFabVisible(delta<0||scrollTop<60);
    lastScrollY.current=scrollTop;
    // Debounced IDB write

// ── SEARCH ───────────────────────────────────────────────────
function SearchView(){
  const{state,dispatch}=useApp();

  const inputRef=useRef();

  },[q,state.notes]);

  function hl(text,query){
    if(!query||!text)return[text];
    const esc=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

  }

    React.createElement('div',{ref:scrollRef,style:{flex:1,overflowY:'auto',padding:16},onScroll:e=>_scrollPos.set(SK,e.currentTarget.scrollTop)},
      !q&&React.createElement('div',{style:{textAlign:'center',padding:'64px 0',color:'var(--text2)'}},
        React.createElement(IC.Search,{s:48,style:{color:'var(--text3)',margin:'0 auto 12px',display:'block',opacity:0.4}}),
        React.createElement('p',null,'Search across all your notes')
      ),
      q&&results.length===0&&React.createElement('div',{style:{textAlign:'center',padding:'64px 0',color:'var(--text2)'}},
        React.createElement('p',{style:{fontSize:20,marginBottom:8}},'🔍'),
        React.createElement('p',null,`No results for "${q}"`)
      ),
      results.length>0&&React.createElement('div',null,
        React.createElement('p',{style:{fontSize:12,color:'var(--text2)',marginBottom:12}},`${results.length} result${results.length!==1?'s':''}`),
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          results.map(note=>{
            const col=state.collections.find(c=>c.id===note.collectionId);
            const folder=note.folderId?state.folders.find(f=>f.id===note.folderId):null;
            const lq=q.toLowerCase();
            const ci=note.content.toLowerCase().indexOf(lq);
            const snippet=ci>=0?note.content.slice(Math.max(0,ci-40),ci+120):note.content.slice(0,120);
            const isCopied=copiedId===note.id;
            return React.createElement('div',{key:note.id,style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,padding:16,cursor:'pointer',transition:'box-shadow 0.15s'},onClick:()=>{dispatch({type:'OPEN_NOTE',id:note.id});dispatch({type:'NAVIGATE',payload:{view:'reader',params:{noteId:note.id}}}); }},
              React.createElement('div',{style:{display:'flex',alignItems:'flex-start',gap:8}},
                React.createElement('div',{style:{flex:1,minWidth:0}},
                  React.createElement('p',{style:{fontWeight:600,color:'var(--text)',fontSize:15,fontFamily:'var(--font-serif)',lineHeight:1.3,marginBottom:4}},hl(note.title,q)),
                  React.createElement('p',{style:{fontSize:12,color:'var(--text2)',marginBottom:6}},`${col?.name||''}${folder?` › ${folder.name}`:''} · ${fmtDate(note.modifiedAt||note.createdAt)}`),
                  React.createElement('p',{style:{fontSize:13,color:'var(--text2)',lineHeight:1.5,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}},hl(snippet.replace(/[#*`_\[\]>~]/g,'').replace(/\n/g,' '),q))
                ),
                React.createElement('button',{style:{padding:8,borderRadius:10,border:'none',cursor:'pointer',flexShrink:0,background:isCopied?'var(--success-light)':'transparent',color:isCopied?'var(--success)':'var(--text3)',transition:'all 0.15s'},onClick:e=>doCopy(note,e),title:'Copy note'},React.createElement(isCopied?IC.Check:IC.Copy,{s:15}))
              )
            );
          })
        )
      )
    )
  );
}

  function doExport(){const b={version:3,timestamp:Date.now(),collections:state.collections,folders:state.folders,notes:state.notes};const url=URL.createObjectURL(new Blob([JSON.stringify(b,null,2)],{type:'application/json'}));const a=document.createElement('a');a.href=url;a.download=`lexicon_backup_${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(url);toast('Exported');}

    React.createElement('div',{className:'safe-top',style:{background:'var(--surface)',borderBottom:'1px solid var(--border)',flexShrink:0,padding:'0 16px 12px'}},
      React.createElement('h1',{style:{fontSize:26,fontWeight:700,color:'var(--text)',fontFamily:'var(--font-serif)',marginTop:8}},'Settings')
    ),
    React.createElement('div',{ref:scrollRef,style:{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:16},onScroll:e=>_scrollPos.set(SK,e.currentTarget.scrollTop)},

      // Appearance
      React.createElement('div',{style:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:20,padding:20}},
        React.createElement('h2',{style:{fontWeight:600,fontSize:15,color:'var(--text)',marginBottom:16}},'Appearance'),
        React.createElement(AppearancePicker,{

// ── APP ROOT ─────────────────────────────────────────────────
function App(){
  const[state,dispatch]=useReducer(reducer,defaultState);
  const[ready,setReady]=useState(false);
  const hydratedRef=useRef(false);
  const navLenRef=useRef(1);

  // Apply theme to <html> + theme-color meta
  useEffect(()=>{
    const cls=state.theme==='dark'?'theme-dark':state.theme==='sepia'?'theme-sepia':'';
    document.documentElement.className=cls;
    const colors={light:'#faf8f3',sepia:'#f5efe0',dark:'#141210'};
    const meta=document.getElementById('theme-color-meta');
    if(meta)meta.content=colors[state.theme]||colors.light;
  },[state.theme]);

  // Android back button support
  useEffect(()=>{
    window.history.replaceState({_lex:0},'');
    const onPop=()=>{
      if(navLenRef.current>1){dispatch({type:'BACK'});window.history.pushState({_lex:navLenRef.current},'');}
    };
    window.addEventListener('popstate',onPop);
    return()=>window.removeEventListener('popstate',onPop);
  },[]);
  useEffect(()=>{navLenRef.current=state.navStack.length;},[state.navStack.length]);

  // Storage init + migration
  useEffect(()=>{
    async function init(){
      try{
        let saved=await DB.get(IDB_KEY);
        if(!saved){const raw=localStorage.getItem('lexicon_v3');if(raw){try{saved=JSON.parse(raw);await DB.set(IDB_KEY,saved);localStorage.removeItem('lexicon_v3');}catch(_){}}}
        if(saved)dispatch({type:'HYDRATE',data:saved});
      }catch{try{const raw=localStorage.getItem('lexicon_v3');if(raw)dispatch({type:'HYDRATE',data:JSON.parse(raw)});}catch(_){}}
      hydratedRef.current=true;setReady(true);
    }
    init();
  },[]);

  // Debounced persistence
  const dState=useDebounce(state,800);
  useEffect(()=>{
    if(!hydratedRef.current)return;
    const{navStack,...persist}=dState;
    DB.set(IDB_KEY,persist).then(ok=>{if(!ok)try{localStorage.setItem('lexicon_v3',JSON.stringify(persist));}catch(_){};});
  },[dState]);

  const enhDispatch=useCallback(action=>{
    dispatch(action);
    if(action.type==='NAVIGATE')window.history.pushState({_lex:(navLenRef.current||1)+1},'');
  },[]);

  const curNav=state.navStack[state.navStack.length-1]||{view:'dashboard',params:{}};
  const curView=curNav.view;
  const isRoot=['dashboard','search','settings'].includes(curView);

  const views={dashboard:DashboardView,collection:CollectionView,editor:EditorView,reader:ReaderView,search:SearchView,settings:SettingsView};
  const View=views[curView]||DashboardView;

  // View key — unique per view+params so same-view navigations (Col A → Col B) remount fresh
  // Cross-view navigations (DashboardView → CollectionView) also remount because it's a different component
  // Scroll persistence is handled by _scrollPos Map (survives remounts)
  const viewKey=`${curView}__${curNav.params?.collectionId||''}__${curNav.params?.noteId||''}__${curNav.params?.folderId||''}`;

  function navTo(payload){
    if(payload.view==='dashboard')enhDispatch({type:'RESET_NAV'});
    else enhDispatch({type:'NAVIGATE',payload});
  }

  if(!ready)return React.createElement(AppCtx.Provider,{value:{state,dispatch:enhDispatch}},
    React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',background:'var(--bg)'}},
      React.createElement('div',{style:{width:60,height:60,background:'var(--accent)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16,boxShadow:'0 4px 20px rgba(193,122,53,0.3)'}},
        React.createElement('span',{style:{fontFamily:'Georgia,serif',fontSize:34,fontWeight:700,color:'white',lineHeight:1}},'L')
      ),
      React.createElement('p',{style:{fontFamily:'var(--font-sans)',color:'var(--text2)',fontSize:14}},'Loading Lexicon…')
    )
  );

  return React.createElement(AppCtx.Provider,{value:{state,dispatch:enhDispatch}},
    React.createElement(ToastProvider,null,
      React.createElement('div',{style:{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)'}},
        React.createElement('div',{key:viewKey,style:{flex:1,minHeight:0},className:!isRoot?'slide-enter':''},
          React.createElement(View)
        ),
        isRoot&&React.createElement(BottomNav,{activeView:curView,onNavigate:navTo})
      )
    )
  );
}

// ── PWA ──────────────────────────────────────────────────────
function setupPWA(){
  const manifest={name:'Lexicon',short_name:'Lexicon',start_url:'.',display:'standalone',background_color:'#faf8f3',theme_color:'#faf8f3',description:'Your personal reading and notes companion',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%23c17a35'/%3E%3Ctext x='96' y='138' font-family='Georgia%2C serif' font-size='110' font-weight='700' fill='white' text-anchor='middle'%3EL%3C/text%3E%3C/svg%3E",sizes:'192x192',type:'image/svg+xml',purpose:'any maskable'}]};
  const ml=document.querySelector('link[rel="manifest"]')||document.createElement('link');
  ml.rel='manifest';ml.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(ml);

  if('serviceWorker' in navigator){
    const sw=`const C='lexicon-v5';const CDN=['cdn.jsdelivr.net','cdnjs.cloudflare.com','esm.sh','fonts.googleapis.com','fonts.gstatic.com'];
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;const u=new URL(e.request.url);const isCDN=CDN.some(h=>u.hostname.includes(h));if(isCDN){e.respondWith(caches.open(C).then(c=>c.match(e.request).then(cached=>{const fresh=fetch(e.request).then(r=>{if(r&&r.status===200)c.put(e.request,r.clone());return r;}).catch(()=>null);return cached||(fresh||new Response('',{status:503}));}).catch(()=>fetch(e.request))));}else{e.respondWith(fetch(e.request).then(r=>{if(r&&r.status===200)caches.open(C).then(c=>c.put(e.request,r.clone()));return r;}).catch(()=>caches.match(e.request)||new Response('Offline',{status:503})));}}`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});
  }
}

initLibs().catch(console.error);
setupPWA();
createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
